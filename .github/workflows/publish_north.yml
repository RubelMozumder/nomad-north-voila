name: Build and publish docker images
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: lab-3.6.2
  NORTH_TOOL_DIR: src/nomad_north_voila/north_tools/voila

permissions:
  packages: write
  contents: write
  attestations: write
  id-token: write

jobs:
  modify-image-tag:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main # checkout main, not the tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Update image tag in source
        run: |
          sed -i "s|ghcr.io/fairmat-nfdi/nomad-north-voila:[^ '\"]*|ghcr.io/fairmat-nfdi/nomad-north-voila:${{ steps.tag.outputs.TAG }}|g" \
            src/nomad_north_voila/north_tools/voila/__init__.py

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/nomad_north_voila/north_tools/voila/__init__.py
          git commit -m "chore: update image tag to ${{ steps.tag.outputs.TAG }}"
          git push origin main

  build:
    name: voila image
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }} # list
      labels: ${{ steps.meta.outputs.labels }} # list
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          show-progress: true
          submodules: true
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          # set latest tag for main branch and tags
          # https://github.com/docker/metadata-action?tab=readme-ov-file#image-name-and-tag-sanitization
          tags: |
            type=ref,event=tag
            type=ref,event=pr,prefix=pr-
            type=raw,value=main,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
          flavor: |
            latest=auto

      # https://docs.docker.com/build/ci/github-actions/share-image-jobs/
      # https://github.com/docker/build-push-action
      - name: Build and publish voila image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.NORTH_TOOL_DIR }}/Dockerfile
          build-args: |
            IMAGE_TAG=${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
